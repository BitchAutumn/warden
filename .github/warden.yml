name: Warden

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  warden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Warden
        env:
          CHASTER_TOKEN: ${{ secrets.CHASTER_TOKEN }}
          WEARER_ID: ${{ secrets.WEARER_ID }}
        run: python3 warden.py
